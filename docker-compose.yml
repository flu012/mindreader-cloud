version: '3.8'

# External services (on the host server):
#   - Neo4j:     bolt://${NEO4J_HOST}:7687
#   - SQL Server: ${SQL_HOST},1433

services:
  mindreader-express:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install --silent && npm start"
    environment:
      - NEO4J_URI=bolt://${NEO4J_HOST:?required}:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?required}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBEDDER_API_KEY=${EMBEDDER_API_KEY:-${LLM_API_KEY}}
      - EMBEDDER_BASE_URL=${EMBEDDER_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-text-embedding-3-small}
      - EMBEDDER_DIM=${EMBEDDER_DIM:-1536}
      - UI_PORT=18900
      - INTERNAL_SECRET=${INTERNAL_SECRET:?required}
    volumes:
      - ${MINDREADER_PATH:-/mnt/e/project/mindreaderv2}:/app
    networks:
      - internal

  cloud-api:
    build:
      context: .
      dockerfile: src/MindReader.Cloud.API/Dockerfile
    ports:
      - "5050:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Server=${SQL_HOST:?required};Database=MindReaderCloud;User Id=${SQL_USER:-sa};Password=${SQL_PASSWORD:?required};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY:?required}
      - Jwt__Issuer=MindReaderCloud
      - Jwt__Audience=MindReaderCloudApp
      - MindReader__ExpressUrl=http://mindreader-express:18900
      - MindReader__InternalSecret=${INTERNAL_SECRET:?required}
    networks:
      - internal
      - public
    depends_on:
      mindreader-express:
        condition: service_started

networks:
  internal:
    internal: true
  public:
